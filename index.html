<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Неоновый градиентный фон под стиль обложки */
            background: linear-gradient(135deg, #100b29, #301847, #0a1128);
            background-size: 200% 200%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Карточка плеера */
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            /* Неоновое свечение */
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), 
                        0 0 60px rgba(255, 0, 255, 0.2);
        }

        .title {
            font-weight: 800;
            font-size: 22px;
            margin-bottom: 5px;
            background: -webkit-linear-gradient(#00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: #b0a8ba;
            margin-bottom: 30px;
        }

        /* Обложка */
        .cover-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 30px auto;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .cover-image.playing {
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 0, 255, 0.6); }
        }

        /* Кнопка Play */
        .play-btn {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 15px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.4);
            font-family: inherit;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.6);
        }

        /* Текст из песни */
        .lyrics {
            margin-top: 30px;
            font-size: 14px;
            line-height: 1.6;
            color: #d1cadd;
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="player-card">
        <h1 class="title">Спасибо, что появилась</h1>
        <p class="subtitle">Специально для тебя 💜</p>

        <div class="cover-container">
            <img src="https://kappa.lol/qow5VH.jpg" alt="Обложка" class="cover-image" id="cover">
        </div>

        <audio id="audio" src="Спасибо.mp3"></audio>

        <button class="play-btn" id="playBtn">▶ Слушать</button>

        <p class="lyrics">
            "Мы встретились случайно в игре...<br>
            А теперь ты стала светом среди серых дней" ✨
        </p>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const cover = document.getElementById('cover');
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '▶ Слушать';
                cover.classList.remove('playing');
            } else {
                audio.play();
                playBtn.innerHTML = '⏸ Пауза';
                cover.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        // Когда трек заканчивается, возвращаем кнопку в исходное состояние
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.innerHTML = '▶ Слушать';
            cover.classList.remove('playing');
        });
    </script>

</body>
</html>
